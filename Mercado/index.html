<script>



function Comprar(){

    let total = 0;

    // Produto 1
    let c0 = document.getElementById("p0");
    let p0 = document.getElementById("n1");
    if (c0.checked && Number(p0.value) > 0) 
    {
        total += Number(p0.value) * 40;
    }

    // Produto 2
    let c1 = document.getElementById("p1");
    let p1 = document.getElementById("n2");
    if (c1.checked && Number(p1.value) > 0) 
    {
        total += Number(p1.value) * 7;
    }

    // Produto 3
    let c2 = document.getElementById("p2");
    let p2 = document.getElementById("n3");
    if (c2.checked && Number(p2.value) > 0) 
    {
        total += Number(p2.value) * 20;
    }

    // Produto 4
    let c3 = document.getElementById("p3");
    let p3 = document.getElementById("n4");
    if (c3.checked && Number(p3.value) > 0) 
    {
        total += Number(p3.value) * 15;
    }

    // Produto 5
    let c4 = document.getElementById("p4");
    let p4 = document.getElementById("n5");
    if (c4.checked && Number(p4.value) > 0) 
    {
        total += Number(p4.value) * 15;
    }

    // Produto 6
    let c5 = document.getElementById("p5");
    let p5 = document.getElementById("n6");
    if (c5.checked && Number(p5.value) > 0) 
    {
        total += Number(p5.value) * 150;
    }

    // Produto 7
    let c6 = document.getElementById("p6");
    let p6 = document.getElementById("n7");
    if (c6.checked  && Number(p6.value) > 0) /* faz a checagem se o a vista esta selecionado */
    { 
        total += Number(p6.value) * 7;
    }

    // Pagamento à vista 
    let av = document.getElementById("av");
    if (av.checked /* faz a checagem se o a vista esta selecionado */ ) {
        total *= 0.915;
    }

    // Pagamento à prazo 
    let ap = document.getElementById("ap");
    let prazo = document.getElementById("prazo").value;

     if (ap.checked) /* faz a checagem se o prazo esta selecionado */ {

        let parcelas = parseInt(prazo) ;// transforma o texto em valoor numerico (caso o primeiro valor seja um numero como 5x logo 5x = 5)

        if (total / parcelas < 10){
            document.getElementById("resultado").innerText = "Não é possível parcelar ";
            return;
        }

        total *= 1.06;

        if (prazo === "5x"){
            total += (6.9 * 5)


        }

        if (prazo === "4x"){
            total += (6.9 * 4)
            
        }

        if (prazo === "3x"){
            total += (6.9 * 3)
            
        }

        if (prazo === "2x"){

            total += (6.9 * 2)
        }
    }
    if(ap.checked || av.checked ) {
    document.getElementById("resultado").innerText =
    "Total da compra: R$ " + total.toFixed(2);
    }
}


</script>
