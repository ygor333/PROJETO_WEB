<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YgorPW</title>
<link rel="stylesheet" href="./yg.css">

<script>

function dobro(){

let n1 = Number(document.getElementById("n1").value); // get = n1 vai receber um valor
let resultado = n1 * 2; 

document.getElementById("resultado").innerText = "Dobro: " + resultado;

}

function triplo(){

let n1 = Number(document.getElementById("n1").value);
let resultado = n1 * 3;

document.getElementById("resultado").innerText = "Triplo: " + resultado;

}

function Quádruplo(){

let n1 = Number(document.getElementById("n1").value);
let resultado = n1 * 4;

document.getElementById("resultado").innerText = "Quádruplo: " + resultado;
}


function Quíntuplo(){

let n1 = Number(document.getElementById("n1").value);
let resultado = n1 * 5;

document.getElementById("resultado").innerText = "Quíntuplo: " + resultado;


}

function Sêxtuplo(){

let n1 = Number(document.getElementById("n1").value);
let resultado = n1 * 6;

document.getElementById("resultado").innerText = "Sêxtuplo: " + resultado;

}

function Bhaskara(){

let a = Number(document.getElementById("a").value);
let b = Number(document.getElementById("b").value);
let c = Number(document.getElementById("c").value);

let delta = Math.pow(b, 2) - (4 * a * c);

if (a === 0 || delta < 0) 
{
    document.getElementById("bhaskara").innerText = "Impossível calcular (a=0 ou delta negativo)";
    return;
}

let x1 = (-b + Math.sqrt(delta)) / (2 * a);
let x2 = (-b - Math.sqrt(delta)) / (2 * a);

document.getElementById("bhaskara").innerText = "Raiz 1 = " + x1 + " | Raiz 2 = " + x2;

}

</script>

</head>

<body>

<header>
    <nav class="nav-esq">
        <h1><b>Ygor Santana</b></h1>
    </nav>
</header>

<main align="center">

    <h1>Calculadora</h1>

    <div class="imagem"></div>

        <h1>Dobro e Triplo</h1>

        <input type="number" id="n1" placeholder="Digite um número">


        <br>
        <br>

<!-- ========================= OPERAÇÕES SIMPLES ====================================-->
        <button class="botao1" onclick="dobro()">Dobro</button>
        <button class="botao1" onclick="triplo()">Triplo</button>

        <button class="botao1" onclick="Quádruplo()">Quádruplo</button>
        <button class="botao1" onclick="Quíntuplo()">Quíntuplo</button>

        <button class="botao1" onclick="Sêxtuplo()">Sêxtuplo</button>

        <h1 id="resultado"></h1>



        <br>
        <br>
        <br>
        <br>


<!-- ========================= Bhaskara ====================================-->

<h1>Bhaskara</h1>

<input type="number" id="a" placeholder="Digite a da equação">
<input type="number" id="b" placeholder="Digite b da equação">
<input type="number" id="c" placeholder="Digite c da equação">


<br>
<br>
<br>

        <button class="botao1" onclick="Bhaskara()">Bhaskara</button>


<h1 id="bhaskara"></h1>


</main>

<footer>
    <p>© 2026 por Ygor Santana. Criado para o trabalho de programação WEB</p>
</footer>

</body>
</html>
