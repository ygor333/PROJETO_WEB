// Potenciação ==========================================================================

function Cubo(){

}

function Quinta(){

document.getElementById("resultado1").innerText = "Sexta Potência: " + resultado1;
}





// ======================== BHASKARA  =====================================================================





function Bhaskara(){

let a = Number(document.getElementById("a").value);
let b = Number(document.getElementById("b").value);
let c = Number(document.getElementById("c").value);

let delta = Math.pow(b, 2) - (4 * a * c);

if (a === 0 || delta < 0) 
{
    document.getElementById("bhaskara").innerText = "Impossível calcular (a=0 ou delta negativo)";
    return;
}

let x1 = (-b + Math.sqrt(delta)) / (2 * a);
let xx1 = x1.toFixed(2);
let x2 = (-b - Math.sqrt(delta)) / (2 * a);
let xx2 = x2.toFixed(2);

document.getElementById("bhaskara").innerText = "Raiz 1 = " + xx1 + " | Raiz 2 = " + xx2;


}


function Media(){

let m1 = Number(document.getElementById("m1").value);
let m2 = Number(document.getElementById("m2").value);
let m3 = Number(document.getElementById("m3").value);
let m4 = Number(document.getElementById("m4").value);


let Media = (m1+m2+m3+m4)/4;

document.getElementById("media").innerText = "A media dos quatros valores é: " + Media;

}
